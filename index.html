<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form_In_Html</title>
    <link rel="icon" href="Profile.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
    <h1>Waseem Abbas Kanhio</h1>
    <p>Frontend Web Developer</p>
</header>
    <form>
        <h2>Welcome to sign up Form</h2>
        <fieldset>
            <legend><b>Sign Up Form</b></legend>
            <label for="Name">
                <b>Full name :</b> <input type="text" id="Name" name="fullname">
            </label>
            <br><br>
            <label for="Uname">
                <b>User Name: </b> <input type="text" id="Uname" name="uname">
            </label>
            <br><br>
            <label for="Email">
                <b>Email: </b> <input type="email" id="Email" name="email">
            </label>
            <br><br>
            <label for="Password">
                <b>Password: </b> <input type="password" id="Password" name="password">
            </label>
            <br><br>
            <label for="Pnumber">
                <b>Phone Number: </b> <input type="number" name="pnumber">
            </label>
            <br><br>
            <label for="Dob">
                <b>Date Of Birth: </b> <input type="date" id="Dob" name="dob">
            </label>
            <br><br>
            <label for="Gender">
                <div id="Gender" >
                    <b>Gender: </b> <input type="radio" name="gender" value="Male" > <b> Male</b>
                               <input type="radio" name="gender" value="Female"> <b>Female</b>
                </div>
            </label>
            <div class="button-group">
    <button type="submit">Click To Proceed</button>
    <button type="reset">Clear Form</button>
</div>
        </fieldset>
    </form>
    <br><br>
    <h2>Welcome to Sign in Form</h2>
    <br>
    <form>
        <fieldset>
            <legend><b>Sign in Form</b></legend>
            <label for="iname">
                <b>Name: </b><input type="text" id="iname" name="name">
            </label>
            <br><br>
            <label for="username"> 
                <b>User Name: </b> <input type="text" id="username" name="username">
            </label>
            <br><br>
            <label for="iEmail">
                <b>Email: </b> <input type="email" id="iEmail" name="Email">
            </label>
            <br><br>
            <label for="iPassword">
                <b>Password:</b> <input type="password" name="Password" id="iPassword">
            </label>
            <button type="submit"><b>Sign in</b></button>
        </fieldset>
    </form>
